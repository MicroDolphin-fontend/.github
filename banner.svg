<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" width="1200" height="280">
  <defs>
    <radialGradient id="orb1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#c4622d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#2d5fa0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#080808"/>
  <rect width="1200" height="280" fill="url(#orb1)"/>
  <rect width="1200" height="280" fill="url(#orb2)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="#c4622d" opacity="0.6"/>

  <!-- Bottom border line -->
  <rect x="0" y="279" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Decorative bar cluster — left -->
  <rect x="56" y="100" width="3" height="80" rx="1.5" fill="#c4622d" opacity="0.9"/>
  <rect x="63" y="116" width="3" height="64" rx="1.5" fill="#c4622d" opacity="0.5"/>
  <rect x="70" y="130" width="3" height="50" rx="1.5" fill="#c4622d" opacity="0.25"/>

  <!-- Decorative bar cluster — right -->
  <rect x="1127" y="100" width="3" height="80" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="1134" y="116" width="3" height="64" rx="1.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="1141" y="130" width="3" height="50" rx="1.5" fill="rgba(255,255,255,0.04)"/>

  <!-- Eyebrow label -->
  <text x="600" y="90" font-family="'Courier New', Courier, monospace" font-size="11" letter-spacing="5" text-anchor="middle" fill="rgba(244,244,241,0.28)" text-transform="uppercase">FIRE DOLPHIN PVT LTD</text>

  <!-- Main wordmark -->
  <text x="600" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900" letter-spacing="-4" text-anchor="middle" fill="#f4f4f1">MICRO<tspan fill="#c4622d">DOLPHIN</tspan></text>

  <!-- Tagline -->
  <text x="600" y="204" font-family="'Courier New', Courier, monospace" font-size="13" letter-spacing="3" text-anchor="middle" fill="rgba(244,244,241,0.38)">DESCRIBE IT  ·  WATCH IT BUILD  ·  SHIP IT LIVE</text>

  <!-- Version chip -->
  <rect x="536" y="222" width="128" height="22" rx="4" fill="rgba(196,98,45,0.12)" stroke="#c4622d" stroke-width="0.75" stroke-opacity="0.35"/>
  <text x="600" y="237" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="2.5" text-anchor="middle" fill="#c4622d">DESIGN SYSTEM v1.0</text>
</svg>