<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" width="1200" height="380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,900;1,900&amp;display=swap');
      .wordmark   { font-family: 'Archivo', 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-size: 68px;  font-weight: 900; letter-spacing: -4px; }
      .tagline    { font-family: 'Archivo', 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-size: 11.5px; font-weight: 400; letter-spacing: 4.5px; }
      .stat-num   { font-family: 'Archivo', 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-size: 28px;  font-weight: 900; letter-spacing: -1.5px; }
      .stat-lbl   { font-family: 'Archivo', 'Courier New', Consolas, monospace; font-size: 9.5px; letter-spacing: 3.5px; }
      .chip-lbl   { font-family: 'Archivo', 'Courier New', Consolas, monospace; font-size: 9.5px; letter-spacing: 2px; }
      .foot-lbl   { font-family: 'Archivo', 'Courier New', Consolas, monospace; font-size: 9px;   letter-spacing: 3.5px; }
    </style>

    <!-- Light orb-a: rgba(196,98,45,0.07) -->
    <radialGradient id="orb-a" cx="75%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#c4622d" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f3f1ed" stop-opacity="0"/>
    </radialGradient>
    <!-- Light orb-b: rgba(45,95,160,0.07) -->
    <radialGradient id="orb-b" cx="18%" cy="95%" r="42%">
      <stop offset="0%" stop-color="#2d5fa0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f3f1ed" stop-opacity="0"/>
    </radialGradient>
    <!-- Maroon orb light -->
    <radialGradient id="orb-c" cx="92%" cy="90%" r="28%">
      <stop offset="0%" stop-color="#7a1f2e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f3f1ed" stop-opacity="0"/>
    </radialGradient>

    <!-- Top accent line -->
    <linearGradient id="shimmer-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c4622d" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#c4622d" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#c4622d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4622d" stop-opacity="0"/>
    </linearGradient>

    <!-- Divider: light border rgba(0,0,0,0.07) -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#000000" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Light shadow for chips -->
    <filter id="chip-shadow" x="-5%" y="-20%" width="110%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1"  flood-color="#000000" flood-opacity="0.05"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8"  flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Base: bg #f3f1ed Cream -->
  <rect width="1200" height="380" fill="#f3f1ed"/>
  <rect width="1200" height="380" fill="url(#orb-a)"/>
  <rect width="1200" height="380" fill="url(#orb-b)"/>
  <rect width="1200" height="380" fill="url(#orb-c)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="1.5" fill="url(#shimmer-line)"/>

  <!-- Bar motif LEFT — ember, same as dark (accent never changes) -->
  <rect x="56"  y="130" width="3" height="90" rx="1.5" fill="#c4622d" opacity="0.9"/>
  <rect x="63"  y="148" width="3" height="72" rx="1.5" fill="#c4622d" opacity="0.50"/>
  <rect x="70"  y="163" width="3" height="57" rx="1.5" fill="#c4622d" opacity="0.24"/>
  <rect x="77"  y="176" width="3" height="44" rx="1.5" fill="#c4622d" opacity="0.10"/>

  <!-- Bar motif RIGHT — dark ink, light opacity -->
  <rect x="1144" y="130" width="3" height="90" rx="1.5" fill="rgba(17,17,16,0.10)"/>
  <rect x="1137" y="148" width="3" height="72" rx="1.5" fill="rgba(17,17,16,0.07)"/>
  <rect x="1130" y="163" width="3" height="57" rx="1.5" fill="rgba(17,17,16,0.04)"/>
  <rect x="1123" y="176" width="3" height="44" rx="1.5" fill="rgba(17,17,16,0.02)"/>

  <!-- Logo — no invert filter on light theme (logo-f: none) -->
  <image href="./outline.svg" x="570" y="42" width="60" height="60"/>

  <!-- Wordmark — txt #111110 ink + accent #c4622d -->
  <text class="wordmark" x="600" y="172" text-anchor="middle" fill="#111110"
  >MICRO<tspan fill="#c4622d">DOLPHIN</tspan></text>

  <!-- Tagline — txt-3 rgba(17,17,16,0.34) -->
  <text class="tagline" x="600" y="206" text-anchor="middle"
    fill="rgba(17,17,16,0.34)"
  >DESCRIBE IT  ·  WATCH IT BUILD  ·  SHIP IT LIVE</text>

  <!-- Divider -->
  <rect x="120" y="228" width="960" height="1" fill="url(#divider)"/>

  <!-- Stats — txt #111110 / txt-3 rgba(17,17,16,0.34) -->
  <text class="stat-num" x="280"  y="266" text-anchor="middle" fill="#111110">12,000+</text>
  <text class="stat-lbl" x="280"  y="285" text-anchor="middle" fill="rgba(17,17,16,0.34)">BUILDERS</text>

  <circle cx="480" cy="270" r="2.5" fill="#c4622d" opacity="0.5"/>

  <text class="stat-num" x="600"  y="266" text-anchor="middle" fill="#111110">50,000+</text>
  <text class="stat-lbl" x="600"  y="285" text-anchor="middle" fill="rgba(17,17,16,0.34)">APPS GENERATED</text>

  <circle cx="720" cy="270" r="2.5" fill="#c4622d" opacity="0.5"/>

  <text class="stat-num" x="920"  y="266" text-anchor="middle" fill="#111110">&lt;60s</text>
  <text class="stat-lbl" x="920"  y="285" text-anchor="middle" fill="rgba(17,17,16,0.34)">LIVE PREVIEW</text>

  <!-- Tech chips — surface #fff + shadow light + border rgba(0,0,0,0.07) -->
  <rect x="308" y="310" width="116" height="22" rx="4" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1" filter="url(#chip-shadow)"/>
  <text class="chip-lbl" x="366" y="325" text-anchor="middle" fill="rgba(17,17,16,0.56)">TYPESCRIPT</text>

  <rect x="434" y="310" width="120" height="22" rx="4" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1" filter="url(#chip-shadow)"/>
  <text class="chip-lbl" x="494" y="325" text-anchor="middle" fill="rgba(17,17,16,0.56)">TAILWIND CSS</text>

  <rect x="564" y="310" width="162" height="22" rx="4" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1" filter="url(#chip-shadow)"/>
  <text class="chip-lbl" x="645" y="325" text-anchor="middle" fill="rgba(17,17,16,0.56)">NEXT.JS APP ROUTER</text>

  <rect x="736" y="310" width="118" height="22" rx="4" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1" filter="url(#chip-shadow)"/>
  <text class="chip-lbl" x="795" y="325" text-anchor="middle" fill="rgba(17,17,16,0.56)">KUBERNETES</text>

  <!-- Footer — txt-3 rgba(17,17,16,0.34) -->
  <text class="foot-lbl" x="600" y="364" text-anchor="middle"
    fill="rgba(17,17,16,0.20)"
  >FIRE DOLPHIN PVT LTD  ·  DESIGN SYSTEM v1.0</text>

  <!-- Bottom border -->
  <rect x="0" y="379" width="1200" height="1" fill="url(#divider)"/>
</svg>